<!DOCTYPE html>
<html>
<head>
    <title>Weather Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            text-align: center;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 150px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
            background: white;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ddd;
        }

        th {
            background: #007bff;
            color: white;
        }

        canvas {
            margin-top: 30px;
        }

        #loading {
            display: none;
            font-weight: bold;
        }

        #status {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>

<body>

<h2>🌦 Weather Analytics Dashboard (Live)</h2>

<input type="text" id="cityInput" placeholder="Enter city">
<button onclick="loadWeather()">Analyze</button>

<p id="loading">Loading data...</p>
<p id="status">Last updated: --</p>

<div class="cards">
    <div class="card"><h4>Avg Temp</h4><p id="avgTemp">--</p></div>
    <div class="card"><h4>Max Temp</h4><p id="maxTemp">--</p></div>
    <div class="card"><h4>Min Temp</h4><p id="minTemp">--</p></div>
    <div class="card"><h4>Avg Humidity</h4><p id="avgHumidity">--</p></div>
</div>

<table id="weatherTable">
    <thead>
        <tr>
            <th>DateTime</th>
            <th>Temp</th>
            <th>Humidity</th>
            <th>Condition</th>
            <th>Wind</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<canvas id="tempChart"></canvas>
<canvas id="humidityChart"></canvas>

<script>
let tempChart, humidityChart;

const BASE_URL = "http://127.0.0.1:5000";
async function loadWeather() {
    try {
        document.getElementById("loading").style.display = "block";

        const city = document.getElementById("cityInput").value || "Bangalore";

        const response = await fetch(`${BASE_URL}/api/weather?city=${city}`);

        if (!response.ok) {
            throw new Error("API not responding");
        }

        const data = await response.json();

        console.log("DATA:", data);

        const tableBody = document.querySelector("#weatherTable tbody");
        tableBody.innerHTML = "";

        let temps = [], humidity = [], labels = [];

        data.forEach(item => {
            tableBody.innerHTML += `
                <tr>
                    <td>${item.datetime}</td>
                    <td>${item.temperature}</td>
                    <td>${item.humidity}</td>
                    <td>${item.condition}</td>
                    <td>${item.wind_speed}</td>
                </tr>
            `;

            temps.push(item.temperature);
            humidity.push(item.humidity);
            labels.push(item.datetime);
        });

        // 📊 Analytics
        const avgTemp = (temps.reduce((a,b)=>a+b,0) / temps.length).toFixed(2);
        const maxTemp = Math.max(...temps);
        const minTemp = Math.min(...temps);
        const avgHumidity = (humidity.reduce((a,b)=>a+b,0) / humidity.length).toFixed(2);

        document.getElementById("avgTemp").innerText = avgTemp + " °C";
        document.getElementById("maxTemp").innerText = maxTemp + " °C";
        document.getElementById("minTemp").innerText = minTemp + " °C";
        document.getElementById("avgHumidity").innerText = avgHumidity + " %";

        if (tempChart) tempChart.destroy();
        if (humidityChart) humidityChart.destroy();

        tempChart = new Chart(document.getElementById("tempChart"), {
            type: "line",
            data: {
                labels: labels,
                datasets: [{
                    label: "Temperature (°C)",
                    data: temps
                }]
            }
        });

        humidityChart = new Chart(document.getElementById("humidityChart"), {
            type: "bar",
            data: {
                labels: labels,
                datasets: [{
                    label: "Humidity (%)",
                    data: humidity
                }]
            }
        });

        document.getElementById("status").innerText =
            "Last updated: " + new Date().toLocaleTimeString();

    } catch (error) {
        console.error(error);
        alert("⚠️ Error fetching data! Check backend or URL");
    } finally {
        document.getElementById("loading").style.display = "none";
    }
}

// Auto load
window.onload = loadWeather;

// Auto refresh
setInterval(loadWeather, 300000);
</script>

</body>
</html>
